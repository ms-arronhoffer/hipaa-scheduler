name: deploy

# Deploys the HIPAA Scheduler stack to the HIPAA-compliant VM. Runs on a
# self-hosted runner (which lives inside the trusted network with access to the
# deployment host) whenever code is pushed to the main branch. Also exposed via
# workflow_dispatch for manual redeploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy with Docker Compose
        # The repo is checked out into the ephemeral runner workspace, but the
        # deployment secrets live in a persistent .env on the host (the same
        # directory backup.sh runs from). Point Compose at it with --env-file so
        # variable interpolation (POSTGRES_PASSWORD, JWT_SECRET, ...) resolves.
        env:
          ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '/opt/hipaa-scheduler/.env' }}
        run: |
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "Deploy env file not found at $ENV_FILE" >&2
            exit 1
          fi
          docker compose --env-file "$ENV_FILE" pull
          docker compose --env-file "$ENV_FILE" up -d --build --remove-orphans

      - name: Wait for backend health
        env:
          ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '/opt/hipaa-scheduler/.env' }}
        run: |
          # Gate on the backend container's own Docker healthcheck (which curls
          # http://localhost:8000/api/v1/readyz inside the container). Checking the
          # container directly keeps this gate about backend readiness only, instead
          # of coupling it to nginx, TLS certs, and the frontend edge path.
          for i in $(seq 1 30); do
            status="$(docker compose --env-file "$ENV_FILE" ps backend --format '{{.Health}}' 2>/dev/null | tail -1)"
            if [[ "$status" == "healthy" ]]; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Waiting for backend to become healthy ($i/30, status=${status:-unknown})..."
            sleep 5
          done
          echo "Backend did not become healthy in time" >&2
          # Surface diagnostics so a failed gate is debuggable from the run logs.
          docker compose --env-file "$ENV_FILE" ps || true
          docker compose --env-file "$ENV_FILE" logs --tail=100 backend || true
          exit 1
