name: dependency-scan

# Supply-chain vulnerability scanning for the Python backend and the three
# Node frontends. Runs on every push/PR touching dependency manifests and on a
# weekly schedule so newly-disclosed advisories are caught even without a code
# change.

on:
  push:
    branches: [main]
    paths:
      - "backend/requirements.txt"
      - "*/package.json"
      - ".github/workflows/dependency-scan.yml"
  pull_request:
    paths:
      - "backend/requirements.txt"
      - "*/package.json"
      - ".github/workflows/dependency-scan.yml"
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend dependencies
        run: pip-audit --requirement backend/requirements.txt --strict --desc

  node-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [admin-frontend, patient-portal, frontend]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Generate lockfile
        working-directory: ${{ matrix.project }}
        run: npm install --package-lock-only
      - name: Audit ${{ matrix.project }} dependencies
        working-directory: ${{ matrix.project }}
        run: npm audit --audit-level=high
