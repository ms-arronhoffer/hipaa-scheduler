# -----------------------------------------------------------------------------
# HIPAA Scheduler — outer reverse proxy
# TLS termination, security headers, HTTP -> HTTPS redirect, PHI-safe access logs.
# Per-vhost server{} blocks live in /etc/nginx/conf.d/*.conf.
# -----------------------------------------------------------------------------
user nginx;
worker_processes auto;
worker_rlimit_nofile 4096;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server_tokens off;              # never leak nginx version
  charset utf-8;

  # PHI-safe access log format.
  # Deliberate omissions vs combined:
  #   - $request        → contains URI + query string; URIs may embed patient IDs
  #   - $http_referer   → may echo the URL we just came from
  #   - $http_user_agent → useful, but low-cardinality bots pollute + we log via app
  # We log method + normalized $uri (path only, no query) + status + upstream time.
  # Query strings are dropped by using $uri instead of $request_uri.
  log_format phi_safe escape=json
    '{"ts":"$time_iso8601",'
    '"remote":"$remote_addr",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"rt":$request_time,'
    '"urt":"$upstream_response_time",'
    '"rid":"$request_id"}';

  access_log /var/log/nginx/access.log phi_safe;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 4096;
  client_max_body_size 25m;       # allow document uploads
  client_body_timeout 30s;
  client_header_timeout 10s;
  send_timeout 30s;

  # Gzip static/API JSON; do NOT compress if TLS breach protection matters
  # (we accept the risk here since responses contain no secrets in body).
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml application/rss+xml image/svg+xml;
  gzip_vary on;
  gzip_min_length 1024;

  # Request ID for correlation with backend logs
  map $http_x_request_id $request_id {
    default   $http_x_request_id;
    ""        $request_id;
  }

  # ---- TLS baseline ----
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:20m;
  ssl_session_timeout 1h;
  ssl_session_tickets off;
  # ssl_stapling on;              # enable once real cert is wired up
  # ssl_stapling_verify on;

  # ---- Rate limits (belt + suspenders; app has its own) ----
  limit_req_zone  $binary_remote_addr zone=auth:10m  rate=10r/m;
  limit_req_zone  $binary_remote_addr zone=api:10m   rate=60r/s;
  limit_req_zone  $binary_remote_addr zone=pub:10m   rate=30r/m;
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  # ---- Shared security headers (applied per-vhost via include) ----
  # Kept as variables so per-vhost CSP can layer on top.

  include /etc/nginx/conf.d/*.conf;
}
