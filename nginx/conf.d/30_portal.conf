# -----------------------------------------------------------------------------
# Patient portal — public-facing booking + magic-link + intake surface.
# Separate rate-limit zone (pub) since these endpoints are unauthenticated.
# Override server_name for production (e.g. portal.scheduler.example.com).
# -----------------------------------------------------------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name portal.localhost portal.scheduler.example.com;

  ssl_certificate     /etc/nginx/certs/portal.crt;
  ssl_certificate_key /etc/nginx/certs/portal.key;

  include /etc/nginx/snippets/security_headers.conf;

  # Portal handles PHI in-browser; tightest CSP of the three.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

  limit_conn perip 30;

  # Public booking / auth endpoints — pub zone (30r/m per IP)
  location ~ ^/api/v1/(pub|patient-auth)/ {
    limit_req zone=pub burst=30 nodelay;
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_set_header   X-Request-ID      $request_id;
  }

  # Authenticated patient API (e.g. /me/appointments) — api zone
  location /api/ {
    limit_req zone=api burst=100 nodelay;
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_set_header   X-Request-ID      $request_id;
  }

  location / {
    proxy_pass         http://patient-portal:80;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
  }
}
