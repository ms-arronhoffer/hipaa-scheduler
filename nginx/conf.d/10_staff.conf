# -----------------------------------------------------------------------------
# Staff frontend (Cloudscape SPA) + /api reverse proxy to backend.
# Host: whatever FRONTEND_URL points to (default vhost — override via
# server_name in production).
# -----------------------------------------------------------------------------
server {
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/staff.crt;
  ssl_certificate_key /etc/nginx/certs/staff.key;

  include /etc/nginx/snippets/security_headers.conf;

  # Staff app CSP — allows connect-src to same-origin API only.
  # 'unsafe-inline' is required for Cloudscape's runtime styles.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

  limit_conn perip 50;

  # ---- API ----
  location /api/ {
    limit_req zone=api burst=200 nodelay;
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_set_header   X-Request-ID      $req_id;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # Tighter limit on auth endpoints
  location = /api/v1/auth/login {
    limit_req zone=auth burst=5 nodelay;
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_set_header   X-Request-ID      $req_id;
  }

  # ---- SPA ----
  location / {
    proxy_pass         http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
  }
}
