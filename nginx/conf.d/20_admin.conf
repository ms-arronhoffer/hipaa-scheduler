# -----------------------------------------------------------------------------
# Super-admin frontend — separate hostname so it can be firewalled to the
# ops network without touching the staff or patient surface.
# Override server_name for production (e.g. admin.scheduler.example.com).
# -----------------------------------------------------------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name admin.localhost admin.scheduler.example.com;

  ssl_certificate     /etc/nginx/certs/admin.crt;
  ssl_certificate_key /etc/nginx/certs/admin.key;

  include /etc/nginx/snippets/security_headers.conf;

  # Admin CSP — stricter connect-src, no external anything.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

  limit_conn perip 20;

  location /api/ {
    limit_req zone=api burst=100 nodelay;
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_set_header   X-Request-ID      $request_id;
  }

  location = /api/v1/auth/login {
    limit_req zone=auth burst=5 nodelay;
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
  }

  location / {
    proxy_pass         http://admin-frontend:80;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
  }
}
