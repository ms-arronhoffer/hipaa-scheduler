# -----------------------------------------------------------------------------
# HTTP -> HTTPS redirect for every vhost.
# ACME challenge path left open so cert renewal via HTTP-01 works.
# -----------------------------------------------------------------------------
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/acme;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}
