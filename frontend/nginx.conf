server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers — the outer reverse proxy adds TLS/HSTS/CSP; these are
  # per-app defaults so the SPA is safe even if served directly.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Long-cache hashed assets; never cache the shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store" always;
  }

  # SPA fallback so React Router owns the URL space.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
